
#####################################################################
# ⚠️  NEVER use 'docker compose down' - kills Pi-hole DNS!        #
# ⚠️  You WILL lose internet before you can run 'up -d'           #
#                                                                   #
# ✅ Safe restart: docker compose -f docker-compose.arr-stack.yml up -d --force-recreate
# ✅ Or use:       ./scripts/restart-stack.sh                      #
#####################################################################

#########################
# Centralized Volumes   #
#########################
volumes:
  gluetun-config:
  qbittorrent-config:
  sabnzbd-config:
  sonarr-config:
  prowlarr-config:
  radarr-config:
  jellyfin-config:
  jellyfin-cache:
  seerr-config:
  bazarr-config:
  dnscrypt-config:
  pihole-etc-pihole:
  lidarr-config:

#########################
# Networks              #
#########################
networks:
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.8.1.0/24
  arr-stack:
    name: arr-stack
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          ip_range: 172.20.0.128/25
          gateway: 172.20.0.1

#########################
# Logging               #
#########################
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

#########################
# Security Defaults     #
#########################
x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# LinuxServer.io images use s6-overlay which needs CHOWN/SETUID/SETGID/DAC_OVERRIDE
# to switch users during init. Extend default-security with these caps.
x-security-lsio: &lsio-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - SETUID
    - SETGID
    - DAC_OVERRIDE

#########################
# Services              #
#########################
services:
  # ═══════════════════════════════════════════════════════════════════════════
  # GLUETUN - VPN gateway. Routes download traffic through your VPN provider.
  # All services below marked "via VPN" share this network for privacy.
  # ═══════════════════════════════════════════════════════════════════════════
  gluetun:
    image: qmcgaw/gluetun:v3.41
    container_name: gluetun
    <<: *default-security
    depends_on:
      pihole:
        condition: service_healthy  # Wait for Pi-hole DNS before VPN connects
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - gluetun-config:/gluetun
    environment:
      # VPN Configuration - see .env.example for provider-specific setup
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      - TZ=${TZ}
      - DNS_ADDRESS=1.1.1.1
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET},172.20.0.0/24,10.8.1.0/24
    ports:
      # Ports for services using network_mode: "service:gluetun"
      # Enables direct local access without Traefik (http://NAS_IP:PORT)
      - "8989:8989"   # Sonarr
      - "7878:7878"   # Radarr
      - "9696:9696"   # Prowlarr
      - "8085:8085"   # qBittorrent
      - "8082:8080"   # SABnzbd
      - "8191:8191"   # FlareSolverr
      - "8686:8686"   # Lidarr 
    networks:
      arr-stack:
        ipv4_address: 172.20.0.3
      vpn-net:
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s  # Give VPN time to establish connection

  # ═══════════════════════════════════════════════════════════════════════════
  # QBITTORRENT - Torrent download client. Downloads files through VPN.
  # Access: qbit.lan | qbit.yourdomain.com | NAS_IP:8085
  # ═══════════════════════════════════════════════════════════════════════════
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    <<: *lsio-security
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8085
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - qbittorrent-config:/config
      - ${MEDIA_ROOT}:/data
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/ && wget -q --spider --timeout=5 http://www.google.com"]
      interval: 2m
      timeout: 15s
      retries: 4
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # SABNZBD - Usenet download client. Downloads via VPN for extra security.
  # Access: sabnzbd.lan | sabnzbd.yourdomain.com | NAS_IP:8082
  # ═══════════════════════════════════════════════════════════════════════════
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:4.5.5
    container_name: sabnzbd
    <<: *lsio-security
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - sabnzbd-config:/config
      - ${MEDIA_ROOT}:/data
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ && wget -q --spider --timeout=5 http://www.google.com"]
      interval: 3m
      timeout: 15s
      retries: 4
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # SONARR - TV show monitor. Watches for new episodes and sends to download.
  # Access: sonarr.lan | sonarr.yourdomain.com | NAS_IP:8989
  # ═══════════════════════════════════════════════════════════════════════════
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    <<: *lsio-security
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - sonarr-config:/config
      - ${MEDIA_ROOT}:/data
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8989/"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # PROWLARR - Indexer manager. Finds download sources for Sonarr/Radarr.
  # Access: prowlarr.lan | prowlarr.yourdomain.com | NAS_IP:9696
  # ═══════════════════════════════════════════════════════════════════════════
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    <<: *lsio-security
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - prowlarr-config:/config
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9696/"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # RADARR - Movie monitor. Watches for new movies and sends to download.
  # Access: radarr.lan | radarr.yourdomain.com | NAS_IP:7878
  # ═══════════════════════════════════════════════════════════════════════════
  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    container_name: radarr
    <<: *lsio-security
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - radarr-config:/config
      - ${MEDIA_ROOT}:/data
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7878/"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # JELLYFIN - Media server. Stream your movies and TV shows like Netflix.
  # Access: jellyfin.lan | jellyfin.yourdomain.com | NAS_IP:8096
  # ═══════════════════════════════════════════════════════════════════════════
  jellyfin:
    image: jellyfin/jellyfin:10.11
    container_name: jellyfin
    <<: *default-security
    cap_add:
      - CHOWN           # Create config/cache subdirs on first run
      - DAC_OVERRIDE    # Write to root-owned volume directories
    ports:
      - "8096:8096"     # Web UI
      - "7359:7359/udp" # Client discovery (auto-detect on LAN)
      - "1900:1900/udp" # DLNA
    environment:
      - TZ=${TZ}
    # Hardware transcoding (Intel Quick Sync) - remove these 4 lines if no Intel GPU
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GROUP_ID:-0}"  # Find ID: getent group render | cut -d: -f3
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${MEDIA_ROOT}/media:/data/media:ro
    networks:
      arr-stack:
        ipv4_address: 172.20.0.4
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 1m
      timeout: 30s
      retries: 2
      start_period: 30s

# ═══════════════════════════════════════════════════════════════════════════
  # DNSCRYPT-PROXY - DNS over HTTPS/DNSCrypt proxy. Encrypts DNS queries.
  # No web UI. Used internally by Pi-hole at 172.20.0.6:5053
  # Protocols: DoH (DNS over HTTPS), DNSCrypt, Anonymized DNS
  # ═══════════════════════════════════════════════════════════════════════════
  dnscrypt-proxy:
    image: klutchell/dnscrypt-proxy:2.1.14
    container_name: dnscrypt-proxy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      arr-stack:
        ipv4_address: 172.20.0.6
    volumes:
      - dnscrypt-config:/config
    environment:
      - TZ=${TZ}
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "/usr/local/bin/dnsprobe", "google.com", "127.0.0.1:5053"]
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # PI-HOLE - DNS server. Enables .lan domains and blocks ads network-wide.
  # Access: pihole.lan/admin | NAS_IP:8081/admin
  # For: Home Pro + Anywhere setups
  # Configure upstream DNS: Settings → DNS → Custom = 172.20.0.6#5053
  # ═══════════════════════════════════════════════════════════════════════════
  pihole:
    image: pihole/pihole:2026.04.0
    container_name: pihole
    depends_on:
      dnscrypt-proxy:
        condition: service_healthy
    ports:
      - "$192.168.0.160:53:53/tcp"  # Bind to NAS IP (not 0.0.0.0) to avoid conflict with host dnsmasq on 127.0.0.1:53
      - "$192.168.0.160:53:53/udp"  # NAS_IP MUST be a static IP — DHCP IPs aren't ready at boot, causing exit 128
      - "8081:80"  # Web UI (local network access)
    networks:
      arr-stack:
        ipv4_address: 172.20.0.5
    environment:
      - TZ=${TZ}
      - FTLCONF_webserver_api_password=${PIHOLE_UI_PASS}
      - FTLCONF_dns_listeningMode=all
      - FTLCONF_misc_etc_dnsmasq_d=true
    volumes:
      - pihole-etc-pihole:/etc/pihole
      - ./pihole/dnsmasq.d:/etc/dnsmasq.d
    security_opt:
      - no-new-privileges:false  # Pi-hole FTL needs setcap to apply capabilities
    cap_drop:
      - ALL
    cap_add:
      - CHOWN           # File ownership during startup
      - NET_ADMIN       # DNS server binding
      - NET_RAW         # Raw socket access for DHCP/DNS
      - SYS_NICE        # Priority scheduling for FTL
      - SETUID          # Drop privileges after startup
      - SETGID          # Drop privileges after startup
      - SETFCAP         # Apply capabilities to FTL binary
      - DAC_OVERRIDE    # Access config files during startup
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "-p", "53", "google.com", "+short"]
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # SEERR (formerly Jellyseerr) - Request portal. Users request movies/shows here.
  # Access: seerr.lan | seerr.yourdomain.com | NAS_IP:5055
  # ═══════════════════════════════════════════════════════════════════════════
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.2.0
    init: true
    container_name: seerr
    <<: *default-security
    cap_add:
      - CHOWN           # Create config subdirs on first run
      - DAC_OVERRIDE    # Write to root-owned volume directories
    depends_on:
      gluetun:
        condition: service_healthy  # Needs gluetun to reach Sonarr/Radarr
        restart: true
    ports:
      - "5055:5055"
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    networks:
      arr-stack:
        ipv4_address: 172.20.0.8
    volumes:
      - seerr-config:/app/config
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5055/api/v1/status"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════
  # BAZARR - Subtitle manager. Automatically downloads subtitles.
  # Access: bazarr.lan | bazarr.yourdomain.com | NAS_IP:6767
  # ═══════════════════════════════════════════════════════════════════════════
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    <<: *lsio-security
    depends_on:
      gluetun:
        condition: service_healthy  # Needs gluetun to reach Sonarr/Radarr
        restart: true
    ports:
      - "6767:6767"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.9
    volumes:
      - bazarr-config:/config
      - ${MEDIA_ROOT}/media:/data/media
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/"]
      interval: 3m
      timeout: 10s
      retries: 2
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # FLARESOLVERR - Cloudflare bypass. Helps Prowlarr access protected sites.
  # Runs behind Gluetun VPN so solved cookies match Prowlarr's exit IP.
  # No web UI. Used internally by Prowlarr at localhost:8191
  # ═══════════════════════════════════════════════════════════════════════════
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    <<: *default-security
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: always
    logging: *default-logging
    healthcheck:
      # Actually test Chrome by making a solve request (catches Chrome crashes)
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json",
             "-d", "{\"cmd\":\"request.get\",\"url\":\"http://localhost:8191/\",\"maxTimeout\":30000}",
             "http://localhost:8191/v1"]
      interval: 10m
      timeout: 60s
      retries: 2
      start_period: 60s
